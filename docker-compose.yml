services:
  identity:
    build:
      context: .
      dockerfile: Dockerfile
    image: identity:latest
    container_name: identity
    restart: unless-stopped
    ports:
      - "127.0.0.1:7102:7102"
      - "127.0.0.1:17102:17102"
    environment:
      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:17102"
      TZ: Europe/Istanbul

      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

      APP_ADMIN_REGISTRATION_ENABLED: ${APP_ADMIN_REGISTRATION_ENABLED}
      APP_SWAGGER_ENABLED: ${APP_SWAGGER_ENABLED}

      MAIL_FROM: ${MAIL_FROM}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ADMIN_REDIRECT_ADDRESS: ${MAIL_ADMIN_REDIRECT_ADDRESS}

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

    networks:
      - network_infra

networks:
  network_infra:
    external: true